<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins;}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding-top:20px;
  overflow-x:hidden;
}

.header{text-align:center;padding:10px 0;}
.logo{width:500px;}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90vh;
}

.form-box{
  background:rgba(252, 8, 8, 0.11);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  width:100%;
  max-width:650px;
  color:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:1/-1;}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}
  .logo{width:220px;}
  .container{padding:10px;align-items:flex-start;}
  .form-box{max-width:100%;padding:15px;}
}

.input-wrapper{
  position:relative;
  margin-top:20px;
}

input{
  width:100%;
  padding:16px 5px 6px 0;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.5);
  font-size:16px;
  color:white;
  background:transparent;
}

input:focus{
  outline:none;
  border-bottom:2px solid #00ffcc;
}

.input-wrapper label{
  position:absolute;
  left:0;
  top:16px;
  color:rgba(255,255,255,0.7);
  font-size:15px;
  transition:0.3s;
  pointer-events:none;
}

input:focus + label,
input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#00ffcc;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:14px;
  cursor:pointer;
}

.submit{
  background:linear-gradient(135deg,#00ffcc,#00c9ff,#0072ff);
  font-weight:600;
}

.success-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,0.8);
  color:white;
  padding:25px;
  border-radius:20px;
  transition:0.4s;
}

.success-box.show{
  transform:translate(-50%,-50%) scale(1);
}

.error{
  color:#ff4d4d;
  font-size:13px;
  margin-top:4px;
}

.tick-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  color:#00ff00;
  font-size:16px;
  display:none;
}

.company-name{
  text-align:center;
  font-size:32px;
  font-weight:700;
  margin-top:10px;
  color:#fff;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo1.png" class="logo">
  <div class="company-name">The Priyanka Fashion</div>
</div>

<div class="container">
<div class="form-box">
<div class="form-grid">

<div class="input-wrapper">
  <input id="name" placeholder=" ">
  <label>Name</label>
</div>

<div class="input-wrapper">
  <input id="mobile" placeholder=" ">
  <label>Mobile Number</label>
</div>

<div class="input-wrapper full">
  <input id="address" placeholder=" ">
  <label>Address</label>
</div>

<div class="input-wrapper">
  <input id="landmark" placeholder=" ">
  <label>Landmark</label>
</div>

<div class="input-wrapper">
  <input id="pincode" placeholder=" ">
  <label>Pin Code</label>
</div>

<div class="input-wrapper">
  <input id="altmobile" placeholder=" ">
  <label>Alternative Number</label>
</div>

<div class="input-wrapper">
  <input id="transaction" placeholder=" ">
  <label>Transaction ID</label>
</div>

<div class="input-wrapper full">
  <input id="amount" placeholder=" ">
  <label>Amount</label>
</div>

<button class="submit full" onclick="sendData()">Submit</button>

</div>
</div>
</div>

<div id="successBox" class="success-box">✔ Data Saved Successfully</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxAcf-CxDt_SZfOOG8Ogb7Chp9ViArtfhudJB-UozHamS7_kUbFnWSzCW_iswJG3cFn/exec";

let isSubmitting=false;

function validateForm(){

  let ids=["name","mobile","address","landmark","pincode","altmobile","transaction","amount"];

  for(let id of ids){
    let el=document.getElementById(id);
    if(el.value.trim()===""){
      alert(id+" required");
      return false;
    }
  }

  if(!/^[0-9]{10}$/.test(document.getElementById("mobile").value)){
    alert("Invalid mobile");
    return false;
  }

  if(Number(document.getElementById("amount").value)<=0){
    alert("Invalid amount");
    return false;
  }

  return true;
}

function sendData(){

  if(!validateForm()) return;
  if(isSubmitting) return;

  let btn=document.querySelector(".submit");

  // ✅ FIXED SAFE VALUES
  let nameVal=document.getElementById("name").value;
  let mobileVal=document.getElementById("mobile").value;
  let addressVal=document.getElementById("address").value;
  let landmarkVal=document.getElementById("landmark").value;
  let pincodeVal=document.getElementById("pincode").value;
  let altmobileVal=document.getElementById("altmobile").value;
  let transactionVal=document.getElementById("transaction").value;
  let amountVal=document.getElementById("amount").value;

  let key=mobileVal+"_"+transactionVal+"_"+amountVal;

  if(localStorage.getItem(key)){
    alert("Already submitted");
    return;
  }

  isSubmitting=true;
  btn.innerText="Submitting...";
  btn.disabled=true;

  let data=JSON.stringify({
    name:nameVal,
    mobile:mobileVal,
    address:addressVal,
    landmark:landmarkVal,
    pincode:pincodeVal,
    altmobile:altmobileVal,
    transaction:transactionVal,
    amount:amountVal
  });

  navigator.sendBeacon(WEB_APP_URL,data);

  localStorage.setItem(key,"done");

  let box=document.getElementById("successBox");
  box.classList.add("show");

  setTimeout(()=>{
    box.classList.remove("show");

    document.querySelectorAll("input").forEach(i=>i.value="");

    btn.innerText="Submit";
    btn.disabled=false;
    isSubmitting=false;
  },2000);
}

</script>

</body>
</html>
