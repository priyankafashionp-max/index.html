<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box; margin:0; padding:0; font-family:Poppins;}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding-top:20px; /* Logo ke upar thoda space */
}

/* HEADER */
.header{
  position:relative;
  width:100%;
  text-align:center;
  padding:10px 0;

}

/* Logo styling */
.logo {
  width: 500px; /* Adjust size */
  height: auto;
  display: inline-block;
}

/* Container */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90vh;
}

/* Form Box */
.form-box{

  background:rgba(252, 8, 8, 0.11);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  width:100%;
  max-width:650px;
  color:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* Full width fields */
.full{
  grid-column:1 / -1;
}

/* Mobile responsive */
@media(max-width:600px){
  .form-grid{
    grid-template-columns:1fr;
  }
}

/* Inputs with animated underline */
.input-wrapper {
  position: relative;
  margin-top:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.5);
  font-size:17px;
  color:white;
  outline:none;
  background:transparent;
  cursor:pointer;
  transition: all 0.3s ease;
}

input::placeholder{
  color:rgba(255,255,255,0.7);
}

/* Animated line effect */
input:focus{
  border-bottom:2px solid #00ffcc;
  box-shadow: 0 2px 10px rgba(0,255,204,0.7);
}
#name:focus, #name:hover {
  border-bottom: 2px solid #ff0000; /* Name input red line */
  box-shadow: 0 2px 8px rgba(255,0,0,0.5);
}

#address:focus, #address:hover {
  border-bottom: 2px solid #00ff00; /* Address input green line */
  box-shadow: 0 2px 8px rgba(0,255,0,0.5);
}

#mobile:focus, #mobile:hover {
  border-bottom: 2px solid #c8ff00; /* Mobile input blue line */
  box-shadow: 0 2px 8px rgba(226, 204, 7, 0.801);
}
/* Hover effect for inputs */
input:hover {
  border-bottom: 2px solid #00ffcc; /* line glow on hover */
  box-shadow: 0 2px 8px rgba(0,255,204,0.5); /* soft glow */
}

/* Optional sliding pseudo-element line */
.input-wrapper::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  height:2px;
  width:0;
  background:#00ffcc;
  transition:width 0.3s ease;
}

.input-wrapper input:focus + .input-wrapper::after{
  width:100%;
}

/* Buttons */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.submit{
  background:linear-gradient(135deg,#00ffcc,#00c9ff,#0072ff);
  color:black;
}

.submit:hover{
  transform:scale(1.05);
}

/* Success Popup */
.success-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(0,0,0,0.8);
  color:white;
  padding:25px 35px;
  border-radius:20px;
  text-align:center;
  z-index:999;
  transition:0.4s;
}

.success-box.show{
  transform:translate(-50%,-50%) scale(1);
}

.tick{
  font-size:50px;
  color:#00ffcc;
  margin-bottom:10px;
}
.company-name{
  text-align:center;
  font-size:32px;
  font-weight:700;
  margin-top:10px;
  letter-spacing:2px;
  color:#fff;

  /* Animation */
  animation:fadeSlide 1.2s ease forwards, glow 2s infinite alternate;
}

/* Slide + Fade Animation */
@keyframes fadeSlide{
  0%{
    opacity:0;
    transform:translateY(-20px);
  }
  100%{
    opacity:1;
    transform:translateY(0);
  }
}

/* Glow Animation */
@keyframes glow{
  0%{
    text-shadow:0 0 5px #fff, 0 0 10px #e65817;
  }
  100%{
    text-shadow:0 0 15px #fff, 0 0 25px #ee270d;
  }
}


</style>
</head>

<body>

<!-- LOGO HEADER -->
<div class="header">
  <img src="logo1.png" alt="Company Logo" class="logo">

<div class="company-name"> The Priyanka Fashion</div>
</div>
<!-- FORM -->
<div class="container">
  
  <div class="form-box">

  <div class="form-grid">

    <div class="input-wrapper"><input id="name" placeholder="Name"></div>
    <div class="input-wrapper"><input id="mobile" type="number" placeholder="Mobile Number"></div>

    <div class="input-wrapper full"><input id="address" placeholder="Address"></div>

    <div class="input-wrapper"><input id="landmark" placeholder="Landmark"></div>
    <div class="input-wrapper"><input id="pincode" type="number" placeholder="Pin Code"></div>

    <div class="input-wrapper"><input id="altmobile" type="number" placeholder="Alternative Number"></div>
    <div class="input-wrapper"><input id="transaction" placeholder="Transaction ID"></div>

    <div class="input-wrapper full"><input id="amount" type="number" placeholder="Amount"></div>

    <button class="submit full" onclick="sendData()">Submit</button>

  </div>

</div>

<!-- SUCCESS BOX -->
<div id="successBox" class="success-box">
  <div class="tick">✔</div>
  <p>Data Saved Successfully</p>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxAcf-CxDt_SZfOOG8Ogb7Chp9ViArtfhudJB-UozHamS7_kUbFnWSzCW_iswJG3cFn/exec";

let isSubmitting = false;

async function sendData(){

  if(isSubmitting) return;

  let btn = document.querySelector(".submit");

  let mobile = document.getElementById("mobile").value;
  let transaction = document.getElementById("transaction").value;
  let amount = document.getElementById("amount").value;

  let uniqueKey = mobile + "_" + transaction + "_" + amount;

  if(localStorage.getItem(uniqueKey)){
    alert("⚠️ Ye data pehle hi submit ho chuka hai");
    return;
  }

  isSubmitting = true;
  btn.innerText = "Submitting...";
  btn.disabled = true;

  try{

    await fetch(WEB_APP_URL,{
      method:"POST",
      mode:"no-cors",   // ✅ IMPORTANT FIX
      body:JSON.stringify({
        name: document.getElementById("name").value,
        address: document.getElementById("address").value,
        landmark: document.getElementById("landmark").value,
        pincode: document.getElementById("pincode").value,
        mobile: mobile,
        altmobile: document.getElementById("altmobile").value,
        transaction: transaction,
        amount: amount
      })
    });

    // ✅ Save unique key
    localStorage.setItem(uniqueKey, "saved");

    // ✅ Success Popup
    let box = document.getElementById("successBox");
    box.classList.add("show");

    setTimeout(()=>{
      box.classList.remove("show");
      document.querySelectorAll("input").forEach(i=>i.value="");

      btn.innerText = "Submit";
      btn.disabled = false;
      isSubmitting = false;

    },2000);

  } catch(err){
    alert("Error aa gaya ❌");
    btn.innerText = "Submit";
    btn.disabled = false;
    isSubmitting = false;
  }
}
</script>

</body>
</html>
